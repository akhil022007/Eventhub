services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: eventhub:dev
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the DB host is the service name "db".
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/eventhub?schema=public"
      # Provided via .env (set-up.sh generates one if missing).
      SESSION_SECRET: "${SESSION_SECRET}"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      # Persist uploaded media across container restarts.
      - uploads:/app/public/uploads

volumes:
  pgdata:
  uploads:
