# Render Blueprint — deploys the app (from the Dockerfile) + managed PostgreSQL.
# In Render: New > Blueprint, point it at this repo. Docs: https://render.com/docs/blueprint-spec
#
# Env vars are injected by Render at runtime (NOT from a .env file in the repo):
#   - SESSION_SECRET : Render generates a random value
#   - DATABASE_URL   : pulled from the managed Postgres below
# Migrations run automatically on boot (the Dockerfile runs `prisma migrate deploy`).

services:
  - type: web
    name: eventhub
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub-db
          property: connectionString

    # Persistent storage for uploaded media. NOTE: Render disks require a PAID
    # instance (Starter+). On the free plan uploads are ephemeral (lost on each
    # redeploy). To keep uploads, set `plan: starter` above and uncomment:
    # disk:
    #   name: uploads
    #   mountPath: /app/public/uploads
    #   sizeGB: 1

databases:
  - name: eventhub-db
    plan: free
    databaseName: eventhub
    user: eventhub
